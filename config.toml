[app]
widgets_dir = "~/.config/easybar/widgets" # Folder that contains your custom Lua widget files.
lua_path = "/opt/homebrew/bin/lua" # Path to the Lua executable EasyBar uses for scripted widgets.
watch_config = false # Auto-reload EasyBar when config.toml changes.

[logging]
enabled = false # Mirrors stdout and stderr log lines into the configured file when true.
debug = false # Enables verbose debug logs without requiring EASYBAR_DEBUG in the service environment.
path = "~/.local/state/easybar/easybar.out" # File path for mirrored EasyBar logs.

[agents.calendar]
enabled = true # Starts the calendar socket client in EasyBar and enables the calendar helper contract.
socket_path = "/tmp/EasyBar/calendar-agent.sock" # Unix socket path used by EasyBar and the calendar agent.

[agents.network]
enabled = true # Starts the network socket client in EasyBar and enables the Wi-Fi helper contract.
socket_path = "/tmp/EasyBar/network-agent.sock" # Unix socket path used by EasyBar and the network agent.
refresh_interval_seconds = 60 # Periodic fallback refresh interval for Wi-Fi state; set to 0 to disable polling.

[bar]
height = 32 # Total height of the bar.
padding_x = 10 # Horizontal left and right padding inside the bar.
extend_behind_notch = true # When true, the bar window spans the full top edge, including behind the notch.

[bar.colors]
background = "#111111" # Bar background color.
border = "#222222" # Bottom border color of the bar.

[builtins.spaces]
enabled = false # Shows or hides the built-in spaces widget.
position = "left" # Places the widget on the left, center, or right side of the bar.
order = 10 # Sort order among widgets in the same position.

[builtins.spaces.style]
icon = "" # Unused fallback icon for the spaces root widget.
text_color = "" # Fallback text color for the spaces root widget.
background_color = "#00000000" # Background behind the whole spaces block.
border_color = "#00000000" # Border color around the whole spaces block.
border_width = 0 # Border width around the whole spaces block.
corner_radius = 0 # Corner radius around the whole spaces block.
margin_x = 0 # Horizontal outer margin around the spaces root container.
margin_y = 0 # Vertical outer margin around the spaces root container.
padding_x = 0 # Horizontal inner padding of the spaces root container.
padding_y = 0 # Vertical inner padding of the spaces root container.
spacing = 0 # Root-level spacing of the spaces widget container.
opacity = 1 # Overall opacity of the spaces widget container.

[builtins.spaces.layout]
spacing = 8 # Gap between one space pill and the next.
hide_empty = true # Hides spaces with no apps.
padding_x = 12 # Horizontal inner padding inside each space pill.
padding_y = 2 # Vertical inner padding inside each space pill.
margin_x = 4 # Horizontal outer margin around the whole spaces row.
margin_y = 4 # Vertical outer margin around the whole spaces row.
corner_radius = 8 # Corner radius of inactive space pills.
focused_corner_radius = 8 # Corner radius of the focused space pill.
focused_scale = 1.0 # Scale multiplier applied to the focused space pill.
inactive_opacity = 0.85 # Opacity applied to inactive space pills.
max_icons = 4 # Maximum number of app icons shown per space.
show_label = true # Shows the workspace label.
show_icons = true # Shows app icons inside each space pill.
show_only_focused_label = false # Shows the label only on the focused space when true.
collapse_inactive = false # Makes inactive spaces more compact when true.
collapsed_padding_x = 6 # Horizontal inner padding for collapsed inactive space pills.
collapsed_padding_y = 4 # Vertical inner padding for collapsed inactive space pills.
click_to_focus_space = true # Switches to a workspace when its pill is clicked.
click_to_focus_app = true # Activates an app when its icon is clicked.

[builtins.spaces.text]
size = 12 # Font size of the space label.
weight = "semibold" # Font weight of the space label.
focused_color = "#d0d0d0" # Text color of the focused space label.
inactive_color = "#d0d0d0" # Text color of inactive space labels.

[builtins.spaces.icons]
size = 20 # Default app icon size in a space.
spacing = 4 # Gap between app icons.
corner_radius = 3 # Corner radius of app icons.
focused_app_size = 28 # Size of the currently focused app icon.
border_width = 1 # Border width of normal app icons.
focused_app_border_width = 1 # Border width of the focused app icon.

[builtins.spaces.colors]
active_background = "#2b2b2b" # Background color of the focused space pill.
inactive_background = "#1a1a1a" # Background color of inactive space pills.
active_border = "#444444" # Border color of the focused space pill.
inactive_border = "#00000000" # Border color of inactive space pills.
focused_app_border = "#00000000" # Border color for the focused app icon in spaces.

[builtins.front_app]
enabled = false # Shows or hides the front-app widget.
position = "left" # Places the widget on the left, center, or right side.
order = 20 # Sort order among widgets in the same position.

[builtins.front_app.style]
icon = "􀈔" # Fallback icon when no app icon is available.
text_color = "#ffffff" # Text color of the widget.
background_color = "#1a1a1a" # Background color of the widget.
border_color = "#333333" # Border color of the widget.
border_width = 1 # Border width of the widget.
corner_radius = 8 # Corner radius of the widget background.
margin_x = 0 # Horizontal outer margin around the widget.
margin_y = 0 # Vertical outer margin around the widget.
padding_x = 8 # Horizontal inner padding of the widget.
padding_y = 4 # Vertical inner padding of the widget.
spacing = 6 # Gap between icon and label.
opacity = 1.0 # Overall opacity of the widget.

[builtins.front_app.content]
show_icon = true # Shows the focused app icon.
show_name = true # Shows the focused app name.
fallback_text = "No App" # Fallback text when no app name is available.
icon_size = 14 # Display size of the app icon.
icon_corner_radius = 4 # Corner radius of the displayed app icon.

[builtins.cpu]
enabled = false # Shows or hides the CPU widget.
position = "right" # Places the widget on the left, center, or right side.
order = 10 # Sort order among widgets in the same position.

# Example native group configuration. This is not enabled by default.
# Uncomment this block and the `group = "system"` lines below if you want
# battery and Wi-Fi rendered inside one shared native container.
#
#[builtins.groups.system]
#position = "right" # Places the native group on the left, center, or right side.
#order = 20 # Sort order among widgets in the same position.
#
#[builtins.groups.system.style]
#background_color = "#1a1a1a" # Background color of the native group.
#border_color = "#333333" # Border color of the native group.
#border_width = 1 # Border width of the native group.
#corner_radius = 8 # Corner radius of the native group.
#margin_x = 0 # Horizontal outer margin around the native group.
#margin_y = 0 # Vertical outer margin around the native group.
#padding_x = 8 # Horizontal inner padding of the native group.
#padding_y = 2 # Vertical inner padding of the native group.
#spacing = 6 # Gap between native children in the group.
#opacity = 1 # Overall opacity of the native group.

[builtins.cpu.style]
icon = "󰍛" # Leading icon of the widget.
text_color = "" # Text color of the widget when no content color is set.
background_color = "" # Background color of the widget.
border_color = "" # Border color of the widget.
border_width = 0 # Border width of the widget.
corner_radius = 0 # Corner radius of the widget background.
margin_x = 0 # Horizontal outer margin around the widget.
margin_y = 0 # Vertical outer margin around the widget.
padding_x = 8 # Horizontal inner padding of the widget.
padding_y = 4 # Vertical inner padding of the widget.
spacing = 6 # Gap between icon, label, and sparkline.
opacity = 1 # Overall opacity of the widget.

[builtins.cpu.content]
label = "CPU" # Text label shown next to the sparkline.
history_size = 10 # Number of samples kept in the sparkline history.
line_width = 1.8 # Stroke width of the sparkline line.
color = "#a6da95" # Color of the sparkline and label.

[builtins.battery]
enabled = false # Shows or hides the battery widget.
position = "right" # Places the widget on the left, center, or right side.
order = 20 # Sort order among widgets in the same position.
# group = "system" # Optional native group id that should contain this widget.

[builtins.battery.style]
icon = "🔋" # Fallback/default battery icon.
text_color = "#ffffff" # Used when color_mode is fixed or data is unavailable.
background_color = "#00000000" # Background color of the widget.
border_color = "#00000000" # Border color of the widget.
border_width = 0 # Border width of the widget.
corner_radius = 8 # Corner radius of the widget background.
margin_x = 0 # Horizontal outer margin around the widget.
margin_y = 0 # Vertical outer margin around the widget.
padding_x = 8 # Horizontal inner padding of the widget.
padding_y = 0 # Vertical inner padding of the widget.
spacing = 10 # Gap between the battery icon and text.
opacity = 1.0 # Overall opacity of the widget.

[builtins.battery.content]
show_percentage = true # Shows the battery percentage text.
unavailable_text = "n/a" # Fallback text when battery data is unavailable.
icon_size = 18 # Font size of the battery icon.
color_mode = "dynamic" # dynamic | fixed
fixed_color = "#8aadf4" # Used only when color_mode = "fixed".
display_mode = "expand" # none | tooltip | expand

[builtins.battery.colors]
high = "#8bd5ca" # Color for 70-100%.
medium = "#eed49f" # Color for 50-69%.
low = "#f5a97f" # Color for 30-49%.
critical = "#ed8796" # Color for 0-29%.

[builtins.battery.popup]
text_color = "#ffffff" # Text color used in the tooltip popup.
background_color = "#111111" # Background color of the tooltip popup.
border_color = "#444444" # Border color of the tooltip popup.
border_width = 1 # Border width of the tooltip popup.
corner_radius = 8 # Corner radius of the tooltip popup.
padding_x = 8 # Horizontal inner padding of the tooltip popup.
padding_y = 6 # Vertical inner padding of the tooltip popup.
margin_x = 0 # Horizontal outer margin around the tooltip popup.
margin_y = 8 # Vertical outer margin around the tooltip popup.

[builtins.volume]
enabled = false # Shows or hides the volume widget.
position = "right" # Places the widget on the left, center, or right side.
order = 20 # Sort order among widgets in the same position.

[builtins.wifi]
enabled = false # Shows or hides the built-in Wi-Fi widget.
position = "right" # Places the widget on the left, center, or right side.
order = 30 # Sort order among widgets in the same position.
# group = "system" # Optional native group id that should contain this widget.

[builtins.wifi.style]
icon = "" # Unused fallback icon for the Wi-Fi root widget.
text_color = "#ffffff" # Default text color for Wi-Fi text.
background_color = "#00000000" # Background color of the widget.
border_color = "#00000000" # Border color of the widget.
border_width = 0 # Border width of the widget.
corner_radius = 8 # Corner radius of the widget.
margin_x = 0 # Horizontal outer margin around the widget.
margin_y = 0 # Vertical outer margin around the widget.
padding_x = 8 # Horizontal inner padding of the widget.
padding_y = 0 # Vertical inner padding of the widget.
spacing = 6 # Gap between signal bars and optional hover label.
opacity = 1 # Overall opacity of the widget.

[builtins.wifi.content]
show_ssid_on_hover = true # Shows the connected SSID while hovering the widget.
disconnected_text = "Wi-Fi" # Hover label shown when Wi-Fi is not connected.
denied_text = "Location" # Hover label shown when Wi-Fi permission is unavailable.
active_color = "#ffffff" # Color of active signal bars.
inactive_color = "#6e738d" # Color of inactive signal bars.
text_color = "#ffffff" # Color of the hover label text.

[builtins.volume.style]
icon = "" # Leading icon of the compact widget.
text_color = "#ffffff" # Text color of the widget.
background_color = "#1a1a1a" # Background color of the widget.
border_color = "#333333" # Border color of the widget.
border_width = 1 # Border width of the widget.
corner_radius = 8 # Corner radius of the widget background.
margin_x = 0 # Horizontal outer margin around the widget.
margin_y = 0 # Vertical outer margin around the widget.
padding_x = 8 # Horizontal inner padding of the widget.
padding_y = 4 # Vertical inner padding of the widget.
spacing = 8 # Gap between icon, label, and slider.
opacity = 1.0 # Overall opacity of the widget.

[builtins.volume.content]
muted_icon = "🔇" # Icon shown when audio is muted.
low_icon = "🔉" # Icon shown for low volume.
high_icon = "🔊" # Icon shown for high volume.
show_percentage = true # Shows the volume percentage text.
min = 0 # Minimum slider and display value.
max = 100 # Maximum slider and display value.
step = 1 # Slider step size.

[builtins.volume.slider]
expand_to_slider_on_hover = true # Expands from compact mode to slider mode on hover.
width = 80 # Width of the slider when shown.

[builtins.calendar]
enabled = false # Shows or hides the calendar widget.
position = "right" # Places the widget on the left, center, or right side.
order = 60 # Sort order among widgets in the same position.

[builtins.calendar.style]
icon = "" # Optional leading icon for the calendar anchor.
text_color = "#ffffff" # Default text color of the anchor.
background_color = "#1a1a1a" # Background color of the anchor widget.
border_color = "#333333" # Border color of the anchor widget.
border_width = 1 # Border width of the anchor widget.
corner_radius = 8 # Corner radius of the anchor widget.
margin_x = 0 # Horizontal outer margin around the anchor widget.
margin_y = 0 # Vertical outer margin around the anchor widget.
padding_x = 8 # Horizontal inner padding of the anchor widget.
padding_y = 4 # Vertical inner padding of the anchor widget.
spacing = 6 # Gap between anchor contents.
opacity = 1.0 # Overall opacity of the anchor widget.

[builtins.calendar.anchor]
layout = "stack" # Anchor layout: item, stack, or inline.
item_format = "EEE, MMM d" # Format used when anchor layout is item.
top_format = "HH:mm" # Top line format in stack or inline layouts.
bottom_format = "d. MMM" # Bottom or second line format in stack or inline layouts.
line_spacing = 0 # Vertical spacing between top and bottom lines in stack layout.
top_text_color = "#ffffff" # Color of the top line text.
bottom_text_color = "#d0d0d0" # Color of the bottom line text.

[builtins.calendar.events]
days = 3 # Number of days of upcoming events to show in the popup.
empty_text = "No upcoming events" # Text shown when no events exist for a day.

[builtins.calendar.birthdays]
show = true # Shows or hides the birthdays section in the popup.
title = "Birthdays" # Title of the birthdays section.
date_format = "dd.MM.yyyy" # Date format used for birthday items.
show_age = false # Shows parsed ages for birthdays when available.

[builtins.calendar.popup]
background_color = "#111111" # Background color of the popup.
border_color = "#444444" # Border color of the popup.
border_width = 1 # Border width of the popup.
corner_radius = 10 # Corner radius of the popup.
padding_x = 10 # Horizontal inner padding of the popup.
padding_y = 8 # Vertical inner padding of the popup.
margin_x = 8 # Horizontal outer margin around the whole popup.
margin_y = 8 # Vertical outer margin around the whole popup.
spacing = 8 # Vertical spacing between popup sections.
item_indent = 8 # Left indent for popup items under a section title.
show_calendar_name = true # Prefixes each event with its calendar name when available.
use_calendar_colors = true # Colors each event line with its source calendar color when available.

[builtins.calendar.popup.birthdays]
title_color = "#89CFEF" # Section title color for birthdays.
item_color = "#7285A5" # Item text color for birthdays.
empty_color = "#c0c0c0" # Empty-state color for birthdays.

[builtins.calendar.popup.today]
title_color = "#5F9EA0" # Section title color for today's events.
item_color = "#d0d0d0" # Item text color for today's events.
empty_color = "#c0c0c0" # Empty-state color for today's events.

[builtins.calendar.popup.tomorrow]
title_color = "#8bd5ca" # Section title color for tomorrow's events.
item_color = "#cfeee8" # Item text color for tomorrow's events.
empty_color = "#c0c0c0" # Empty-state color for tomorrow's events.

[builtins.calendar.popup.future]
title_color = "#91d7e3" # Section title color for future events.
item_color = "#d0d0d0" # Item text color for future events.
empty_color = "#c0c0c0" # Empty-state color for future events.

[builtins.time]
enabled = false # Shows or hides the time widget.
position = "right" # Places the widget on the left, center, or right side.
order = 40 # Sort order among widgets in the same position.

[builtins.time.style]
icon = "🕒" # Leading icon of the widget.
text_color = "#ffffff" # Text color of the widget.
background_color = "#1a1a1a" # Background color of the widget.
border_color = "#333333" # Border color of the widget.
border_width = 1 # Border width of the widget.
corner_radius = 8 # Corner radius of the widget background.
margin_x = 0 # Horizontal outer margin around the widget.
margin_y = 0 # Vertical outer margin around the widget.
padding_x = 8 # Horizontal inner padding of the widget.
padding_y = 4 # Vertical inner padding of the widget.
spacing = 6 # Gap between icon and text.
opacity = 1.0 # Overall opacity of the widget.

[builtins.time.content]
format = "HH:mm" # Time format string.

[builtins.date]
enabled = false # Shows or hides the date widget.
position = "right" # Places the widget on the left, center, or right side.
order = 50 # Sort order among widgets in the same position.

[builtins.date.style]
icon = "📅" # Leading icon of the widget.
text_color = "#ffffff" # Text color of the widget.
background_color = "#1a1a1a" # Background color of the widget.
border_color = "#333333" # Border color of the widget.
border_width = 1 # Border width of the widget.
corner_radius = 8 # Corner radius of the widget background.
margin_x = 0 # Horizontal outer margin around the widget.
margin_y = 0 # Vertical outer margin around the widget.
padding_x = 8 # Horizontal inner padding of the widget.
padding_y = 4 # Vertical inner padding of the widget.
spacing = 6 # Gap between icon and text.
opacity = 1.0 # Overall opacity of the widget.

[builtins.date.content]
format = "yyyy-MM-dd" # Date format string.
