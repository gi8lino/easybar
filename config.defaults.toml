[builtins.volume.slider]
expand_to_slider_on_hover = true # Expands from compact mode to slider mode on hover.
width = 80 # Width of the slider when shown.

[builtins.calendar]
enabled = false # Shows or hides the unified calendar widget.
position = "right" # Places the widget on the left, center, or right side.
order = 60 # Sort order among widgets in the same position.
popup_mode = "upcoming" # none | upcoming | month

[builtins.calendar.style]
icon = "" # Optional leading icon for the calendar anchor.
text_color = "#ffffff" # Default text color of the anchor.
background_color = "#1a1a1a" # Background color of the anchor widget.
border_color = "#333333" # Border color of the anchor widget.
border_width = 1 # Border width of the anchor widget.
corner_radius = 8 # Corner radius of the anchor widget.
margin_x = 0 # Horizontal outer margin around the anchor widget.
margin_y = 0 # Vertical outer margin around the anchor widget.
padding_x = 8 # Horizontal inner padding of the anchor widget.
padding_y = 4 # Vertical inner padding of the anchor widget.
spacing = 6 # Gap between anchor contents.
opacity = 1.0 # Overall opacity of the anchor widget.

[builtins.calendar.anchor]
layout = "stack" # Anchor layout: item, stack, or inline.
item_format = "EEE, MMM d" # Format used when anchor layout is item.
top_format = "HH:mm" # Top line format in stack or inline layouts.
bottom_format = "d. MMM" # Bottom or second line format in stack or inline layouts.
line_spacing = 0 # Vertical spacing between top and bottom lines in stack layout.
top_text_color = "#ffffff" # Color of the top line text.
bottom_text_color = "#d0d0d0" # Color of the bottom line text.

[builtins.calendar.upcoming.events]
days = 3 # Number of days of upcoming events to show in the popup.
empty_text = "No upcoming events" # Text shown when no events exist for a day.

[builtins.calendar.upcoming.birthdays]
show = true # Shows or hides the birthdays section in the upcoming popup.
title = "Birthdays" # Title of the birthdays section.
date_format = "dd.MM.yyyy" # Date format used for birthday items.
show_age = false # Shows parsed ages for birthdays when available.

[builtins.calendar.upcoming.popup]
background_color = "#111111" # Background color of the upcoming popup.
border_color = "#444444" # Border color of the upcoming popup.
border_width = 1 # Border width of the upcoming popup.
corner_radius = 10 # Corner radius of the upcoming popup.
padding_x = 10 # Horizontal inner padding of the upcoming popup.
padding_y = 8 # Vertical inner padding of the upcoming popup.
margin_x = 8 # Horizontal outer margin around the whole popup.
margin_y = 8 # Vertical outer margin around the whole popup.
spacing = 8 # Vertical spacing between popup sections.
item_indent = 8 # Left indent for popup items under a section title.
show_calendar_name = false # Prefixes each event with its calendar name when available.
use_calendar_colors = true # Colors each event line with its source calendar color when available.

[builtins.calendar.upcoming.popup.birthdays]
title_color = "#89CFEF" # Section title color for birthdays.
item_color = "#7285A5" # Item text color for birthdays.
empty_color = "#c0c0c0" # Empty-state color for birthdays.

[builtins.calendar.upcoming.popup.today]
title_color = "#5F9EA0" # Section title color for today's events.
item_color = "#d0d0d0" # Item text color for today's events.
empty_color = "#c0c0c0" # Empty-state color for today's events.

[builtins.calendar.upcoming.popup.tomorrow]
title_color = "#8bd5ca" # Section title color for tomorrow's events.
item_color = "#cfeee8" # Item text color for tomorrow's events.
empty_color = "#c0c0c0" # Empty-state color for tomorrow's events.

[builtins.calendar.upcoming.popup.future]
title_color = "#91d7e3" # Section title color for future events.
item_color = "#d0d0d0" # Item text color for future events.
empty_color = "#c0c0c0" # Empty-state color for future events.

[builtins.calendar.month.popup.style]
background_color = "#111111" # Background color of the month popup.
border_color = "#444444" # Border color of the month popup.
border_width = 1 # Border width of the month popup.
corner_radius = 10 # Corner radius of the month popup.
padding_x = 10 # Horizontal inner padding of the month popup.
padding_y = 8 # Vertical inner padding of the month popup.
spacing = 8 # Gap between calendar and appointments areas and internal popup sections.
item_indent = 8 # Left indent for appointment details under the title line.
margin_x = 8 # Horizontal outer margin around the whole month popup.
margin_y = 8 # Vertical outer margin around the whole month popup.

[builtins.calendar.month.popup.calendar]
show_week_numbers = true # Shows the week numbers in the calendar grid.
show_event_indicators = true # Shows dots under days that contain events.
header_text_color = "#ffffff" # Text color of the month header and appointments title.
weekday_text_color = "#91d7e3" # Text color of the weekday labels.
first_weekday = 2 # First weekday used by the month grid. 1 = Sunday, 2 = Monday, ... 7 = Saturday. When omitted, EasyBar uses the current calendar setting.
weekday_format = "dd" # Weekday label format: d | dd | ddd. dddd is not allowed.
# weekday_symbols = ["M", "T", "W", "T", "F", "S", "S"] # Optional custom weekday labels for Monday-first order. Must contain exactly 7 entries from Monday to Sunday.
day_text_color = "#d0d0d0" # Text color of days in the current month.
outside_month_text_color = "#6e738d" # Text color of trailing and leading days outside the current month.
today_background_color = "#8bd5ca33" # Background color of today's day cell when not selected.
indicator_color = "#8bd5ca" # Default color of day event indicators when an event has no calendar color.

[builtins.calendar.month.popup.selection]
selected_text_color = "#0B1020" # Text color of selected day cells.
selected_background_color = "#89B4FA" # Background color of selected day cells.
selection_date_format = "yyyy-MM-dd" # Date header format used in the agenda when a multi-day range is selected.
selection_date_separator = " - " # Separator used between start and end dates when a date range is selected.
allows_range_selection = true # Allows selecting a date range by dragging across days.
reset_selection_on_third_tap = true # Reserved selection behavior flag for the month popup.

[builtins.calendar.month.popup.agenda]
event_text_color = "#d0d0d0" # Text color of appointment rows.
empty_text_color = "#c0c0c0" # Text color of the appointments empty state.
secondary_text_color = "#91d7e3" # Text color of secondary appointment details.
layout = "calendar_appointments_vertical" # Popup layout: calendar_appointments_horizontal | appointments_calendar_horizontal | calendar_appointments_vertical | appointments_calendar_vertical
appointments_scrollable = true # Makes the appointments area scroll vertically when true.
appointments_min_height = 180 # Minimum height of the appointments area. Set equal to appointments_max_height for a fixed height.
appointments_max_height = 240 # Maximum height of the appointments area. Set equal to appointments_min_height for a fixed height.
empty_text = "No appointments" # Text shown when the selected day or range has no appointments.
agenda_title = "Appointments" # Title shown above the appointments list.
show_calendar_name = false # Shows the source calendar name for appointments.
show_all_day_label = true # Shows "All day" for all-day events except birthdays, which omit it.
all_day_label = "All day" # Text shown for all-day events when show_all_day_label is true
show_location = true # Shows the event location line when present.
show_travel_time = true # Shows the travel-time line when present.
max_visible_appointments = 8 # Maximum number of visible appointments when scrolling is disabled.

[builtins.calendar.month.popup.birthdays]
show_birthdays = false # Includes birthday calendars in the month popup as regular appointments.
birthdays_show_age = false # Shows parsed ages for birthday appointments when available.
birthday_icon = "" # Leading icon shown for birthday appointments.
birthday_icon_color = "" # Color of the birthday icon. When omitted, event_text_color is used.

[builtins.calendar.month.popup.filters]
included_calendar_names = [] # Optional allowlist of calendar names. Empty means all calendars are eligible.
excluded_calendar_names = [] # Optional denylist of calendar names applied after the allowlist.

[builtins.calendar.month.popup.anchor]
anchor_date_format = "EEE d MMM" # Anchor date format used when popup_mode = "month" and anchor layout = "item".
anchor_text_color = "#ffffff" # Anchor text color used when popup_mode = "month".
anchor_show_date_text = true # Shows the date text in the anchor when popup_mode = "month".

[builtins.calendar.month.popup.composer]
start_label = "Begin" # Labels shown for the start and end times.
end_label = "End" # Labels shown for the start and end times.
all_day_label = "All day" # Label shown for all-day events.
title_placeholder = "What are you doing?" # Placeholder text for the composer title field.
