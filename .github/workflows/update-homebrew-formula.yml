name: update-homebrew-formula

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag
        required: true
        type: string
      version:
        description: Release version without leading v
        required: true
        type: string

jobs:
  update-formula:
    runs-on: ubuntu-latest

    steps:
      - name: Derive asset URL
        id: vars
        shell: bash
        run: |
          TAG="${{ inputs.tag }}"
          VERSION="${{ inputs.version }}"
          ASSET_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/EasyBar-${VERSION}.zip"

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "asset_url=${ASSET_URL}" >> "$GITHUB_OUTPUT"

      - name: Download release archive
        shell: bash
        run: |
          curl -fL "${{ steps.vars.outputs.asset_url }}" -o EasyBar.zip

      - name: Compute SHA-256
        id: sha
        shell: bash
        run: |
          SHA="$(sha256sum EasyBar.zip | awk '{print $1}')"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: gi8lino/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formulas
        shell: bash
        run: |
          EASYBAR_FORMULA_FILE="homebrew-tap/Formula/easybar.rb"
          CALENDAR_AGENT_FORMULA_FILE="homebrew-tap/Formula/easybar-calendar-agent.rb"
          NETWORK_AGENT_FORMULA_FILE="homebrew-tap/Formula/easybar-network-agent.rb"
          mkdir -p "$(dirname "${EASYBAR_FORMULA_FILE}")"

          VERSION="${{ steps.vars.outputs.version }}"
          SHA="${{ steps.sha.outputs.sha }}"

          cat > "${EASYBAR_FORMULA_FILE}" <<EOF
          class Easybar < Formula
            desc "Scriptable macOS status bar with SwiftUI and Lua widgets"
            homepage "https://github.com/gi8lino/easybar"
            url "https://github.com/gi8lino/easybar/releases/download/v${VERSION}/EasyBar-${VERSION}.zip"
            sha256 "${SHA}"
            license "Apache-2.0"
            version "${VERSION}"

            depends_on macos: :sonoma
            depends_on "easybar-calendar-agent"
            depends_on "easybar-network-agent"

            def install
              libexec.install "EasyBar.app"
              bin.install "easybarctl"

              (bin/"easybar").write <<~SH
                #!/bin/bash
                exec "#{libexec}/EasyBar.app/Contents/MacOS/EasyBar" "\$@"
              SH

              (var/"log/easybar").mkpath
            end

            service do
              run [opt_bin/"easybar"]
              environment_variables PATH: std_service_path_env, LANG: "en_US.UTF-8"
              keep_alive true
              process_type :interactive
              working_dir HOMEBREW_PREFIX
              log_path var/"log/easybar/easybar.out.log"
              error_log_path var/"log/easybar/easybar.err.log"
            end

            test do
              assert_match "easybarctl", shell_output("#{bin}/easybarctl --help 2>&1")
            end
          end
          EOF

          cat > "${CALENDAR_AGENT_FORMULA_FILE}" <<EOF
          class EasybarCalendarAgent < Formula
            desc "Calendar EventKit helper service for EasyBar"
            homepage "https://github.com/gi8lino/easybar"
            url "https://github.com/gi8lino/easybar/releases/download/v${VERSION}/EasyBar-${VERSION}.zip"
            sha256 "${SHA}"
            license "Apache-2.0"
            version "${VERSION}"

            depends_on macos: :sonoma

            def install
              libexec.install "EasyBarCalendarAgent.app"

              (bin/"easybar-calendar-agent").write <<~SH
                #!/bin/bash
                exec "#{libexec}/EasyBarCalendarAgent.app/Contents/MacOS/EasyBarCalendarAgent" "\$@"
              SH

              (var/"log/easybar-calendar-agent").mkpath
            end

            service do
              run [opt_bin/"easybar-calendar-agent"]
              environment_variables PATH: std_service_path_env, LANG: "en_US.UTF-8"
              keep_alive true
              process_type :interactive
              working_dir HOMEBREW_PREFIX
              log_path var/"log/easybar-calendar-agent/easybar-calendar-agent.out.log"
              error_log_path var/"log/easybar-calendar-agent/easybar-calendar-agent.err.log"
            end

            test do
              assert_predicate libexec/"EasyBarCalendarAgent.app", :exist?
            end
          end
          EOF

          cat > "${NETWORK_AGENT_FORMULA_FILE}" <<EOF
          class EasybarNetworkAgent < Formula
            desc "Wi-Fi and network helper service for EasyBar"
            homepage "https://github.com/gi8lino/easybar"
            url "https://github.com/gi8lino/easybar/releases/download/v${VERSION}/EasyBar-${VERSION}.zip"
            sha256 "${SHA}"
            license "Apache-2.0"
            version "${VERSION}"

            depends_on macos: :sonoma

            def install
              libexec.install "EasyBarNetworkAgent.app"

              (bin/"easybar-network-agent").write <<~SH
                #!/bin/bash
                exec "#{libexec}/EasyBarNetworkAgent.app/Contents/MacOS/EasyBarNetworkAgent" "\$@"
              SH

              (var/"log/easybar-network-agent").mkpath
            end

            service do
              run [opt_bin/"easybar-network-agent"]
              environment_variables PATH: std_service_path_env, LANG: "en_US.UTF-8"
              keep_alive true
              process_type :interactive
              working_dir HOMEBREW_PREFIX
              log_path var/"log/easybar-network-agent/easybar-network-agent.out.log"
              error_log_path var/"log/easybar-network-agent/easybar-network-agent.err.log"
            end

            test do
              assert_predicate libexec/"EasyBarNetworkAgent.app", :exist?
            end
          end
          EOF

      - name: Commit and push changes
        shell: bash
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add Formula/easybar.rb
          git add Formula/easybar-calendar-agent.rb
          git add Formula/easybar-network-agent.rb

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "easybar ${{ steps.vars.outputs.version }}"
          git push
