name: update-homebrew-formula

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag
        required: true
        type: string
      version:
        description: Release version without leading v
        required: true
        type: string

jobs:
  update-formula:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout EasyBar
        uses: actions/checkout@v6

      - name: Derive asset URL
        id: vars
        shell: bash
        run: |
          TAG="${{ inputs.tag }}"
          VERSION="${{ inputs.version }}"
          ASSET_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/EasyBar-${VERSION}.zip"

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "asset_url=${ASSET_URL}" >> "$GITHUB_OUTPUT"

      - name: Download release archive
        shell: bash
        run: curl -fL "${{ steps.vars.outputs.asset_url }}" -o EasyBar.zip

      - name: Compute SHA-256
        id: sha
        shell: bash
        run: |
          SHA="$(sha256sum EasyBar.zip | awk '{print $1}')"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"

      - name: Checkout Homebrew tap
        uses: actions/checkout@v6
        with:
          repository: gi8lino/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formulas
        shell: bash
        run: |
          scripts/release/update-homebrew-formulas.sh \
            --tap-dir homebrew-tap \
            --repository "${GITHUB_REPOSITORY}" \
            --tag "${{ steps.vars.outputs.tag }}" \
            --version "${{ steps.vars.outputs.version }}" \
            --sha "${{ steps.sha.outputs.sha }}"

      - name: Commit and push changes
        shell: bash
        run: |
          scripts/release/commit-homebrew-formulas.sh \
            --tap-dir homebrew-tap \
            --version "${{ steps.vars.outputs.version }}"
