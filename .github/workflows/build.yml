name: Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: macos-26
    permissions:
      contents: write
      actions: write

    env:
      BUNDLE_ID: io.github.gi8lino.easybar
      XCODE_VERSION: "26"

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Select pinned Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Print toolchain info
        shell: bash
        run: |
          sw_vers
          uname -a
          xcode-select -p
          xcodebuild -version
          swift --version
          xcrun --show-sdk-path
          xcrun --show-sdk-version

      - name: Install dependencies
        shell: bash
        run: scripts/ci/install-release-dependencies.sh

      - name: Derive version from tag
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"

          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid release tag: ${TAG}"
            echo "Release tags must use vMAJOR.MINOR.PATCH or vMAJOR.MINOR.PATCH-prerelease."
            exit 1
          fi

          VERSION="${TAG#v}"

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          echo "Tag: $TAG"
          echo "Version: $VERSION"

      - name: Clean build directories
        shell: bash
        run: make clean

      - name: Run tests
        shell: bash
        timeout-minutes: 10
        run: scripts/ci/run-swift-tests.sh

      - name: Upload test log
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: swift-test-log
          path: test.log

      - name: Verify generated artifacts are current
        run: make check-generated

      - name: Build release package
        shell: bash
        run: |
          make package \
            ARCH=universal \
            VERSION="${{ steps.version.outputs.version }}" \
            BUNDLE_ID="${BUNDLE_ID}"

      - name: Verify release package
        shell: bash
        run: |
          make verify-release \
            ARCH=universal \
            VERSION="${{ steps.version.outputs.version }}"

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: EasyBar-${{ steps.version.outputs.version }}
          path: dist/EasyBar-${{ steps.version.outputs.version }}.zip
          if-no-files-found: error

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            "dist/EasyBar-${{ steps.version.outputs.version }}.zip" \
            --generate-notes

      - name: Trigger Homebrew formula update workflow
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh workflow run update-homebrew-formula.yml \
            -f tag="${{ steps.version.outputs.tag }}" \
            -f version="${{ steps.version.outputs.version }}"


