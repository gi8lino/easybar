name: build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: macos-26
    permissions:
      contents: write
      actions: write

    env:
      BUNDLE_ID: io.github.gi8lino.easybar
      XCODE_VERSION: "26"

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Select pinned Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Print toolchain info
        shell: bash
        run: |
          sw_vers
          uname -a
          xcode-select -p
          xcodebuild -version
          swift --version
          xcrun --show-sdk-path
          xcrun --show-sdk-version

      - name: Install dependencies
        shell: bash
        run: |
          brew update

          if ! command -v magick >/dev/null 2>&1; then
            brew install imagemagick
          fi

          if [ ! -x /opt/homebrew/bin/lua ]; then
            brew install lua
          fi

          echo "IMAGE_CONVERT=$(command -v magick)" >> "$GITHUB_ENV"

          magick -version
          /opt/homebrew/bin/lua -v

      - name: Derive version from tag
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          echo "Tag: $TAG"
          echo "Version: $VERSION"

      - name: Clean build directories
        shell: bash
        run: |
          make clean

      - name: Run tests
        shell: bash
        timeout-minutes: 10
        run: |
          set -euo pipefail

          swift test > test.log 2>&1 &
          test_pid=$!

          while kill -0 "$test_pid" 2>/dev/null; do
            sleep 30
            echo "---- swift test still running; last 80 lines ----"
            tail -n 80 test.log || true
          done

          wait "$test_pid" || {
            status=$?
            echo "---- extracted failures ----"
            grep -nE "(: error:|XCTAssert|failed -|Test Case '.*failed|Test Suite '.*failed)" test.log || true
            echo "---- full test log ----"
            cat test.log
            exit "$status"
          }

      - name: Upload test log
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: swift-test-log
          path: test.log

      - name: Build release package
        shell: bash
        run: |
          make package \
            ARCH=universal \
            VERSION="${{ steps.version.outputs.version }}" \
            BUNDLE_ID="${BUNDLE_ID}"

      - name: Verify release package
        shell: bash
        run: |
          make verify-release \
            ARCH=universal \
            VERSION="${{ steps.version.outputs.version }}"

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: EasyBar-${{ steps.version.outputs.version }}
          path: dist/EasyBar-${{ steps.version.outputs.version }}.zip
          if-no-files-found: error

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            "dist/EasyBar-${{ steps.version.outputs.version }}.zip" \
            --generate-notes

      - name: Trigger Homebrew formula update workflow
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh workflow run update-homebrew-formula.yml \
            -f tag="${{ steps.version.outputs.tag }}" \
            -f version="${{ steps.version.outputs.version }}"
