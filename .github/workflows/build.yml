name: build

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write
      actions: write

    env:
      BUNDLE_ID: com.gi8lino.EasyBar

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Derive version from tag
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          echo "Tag: $TAG"
          echo "Version: $VERSION"

      - name: Build universal release artifact
        shell: bash
        run: |
          make release \
            ARCH=universal \
            VERSION="${{ steps.version.outputs.version }}" \
            BUNDLE_ID="${BUNDLE_ID}"

      - name: Verify bundled artifacts
        shell: bash
        run: |
          file "dist/EasyBar.app/Contents/MacOS/EasyBar"
          file "dist/EasyBarCalendarAgent"
          file "dist/easybarctl"
          test -f "dist/EasyBar.app/Contents/Info.plist"
          test -d "dist/EasyBar.app/EasyBar_EasyBar.bundle"
          test -f "dist/EasyBarCalendarAgent"
          test -f "dist/EasyBar-${{ steps.version.outputs.version }}.zip"
          plutil -p "dist/EasyBar.app/Contents/Info.plist"

      - name: Print package checksum
        shell: bash
        run: |
          shasum -a 256 "dist/EasyBar-${{ steps.version.outputs.version }}.zip"

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            "dist/EasyBar-${{ steps.version.outputs.version }}.zip" \
            --generate-notes

      - name: Trigger Homebrew formula update workflow
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh workflow run update-homebrew-formula.yml \
            -f tag="${{ steps.version.outputs.tag }}" \
            -f version="${{ steps.version.outputs.version }}"
