name: Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: macos-26
    permissions:
      contents: write
      actions: write

    env:
      BUNDLE_ID: io.github.gi8lino.easybar
      XCODE_VERSION: "26"

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Select pinned Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Print toolchain info
        shell: bash
        run: |
          sw_vers
          uname -a
          xcode-select -p
          xcodebuild -version
          swift --version
          xcrun --show-sdk-path
          xcrun --show-sdk-version

      - name: Install dependencies
        shell: bash
        run: scripts/ci/install-release-dependencies.sh

      - name: Derive version from tag
        id: version
        shell: bash
        run: scripts/release/derive-release-vars.sh --tag "${GITHUB_REF_NAME}"

      - name: Verify source tree
        run: make verify-source-tree

      - name: Clean stale build directories
        shell: bash
        run: make clean

      - name: Cache SwiftPM
        uses: actions/cache@v6
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/org.swift.swiftpm
            ~/Library/Developer/Xcode/DerivedData
          key: swiftpm-${{ runner.os }}-${{ runner.arch }}-${{ env.XCODE_VERSION }}-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: |
            swiftpm-${{ runner.os }}-${{ runner.arch }}-${{ env.XCODE_VERSION }}-

      - name: Build tests
        shell: bash
        timeout-minutes: 2
        run: scripts/ci/run-swift-tests.sh build-tests.log swift build --build-tests

      - name: Run tests
        shell: bash
        timeout-minutes: 10
        run: scripts/ci/run-swift-tests.sh test.log swift test --skip-build

      - name: Upload Swift test logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: swift-test-logs
          path: |
            build-tests.log
            test.log
          if-no-files-found: ignore

      - name: Verify generated artifacts are current
        run: make check-generated

      - name: Build release package
        shell: bash
        run: |
          make package \
            ARCH=universal \
            VERSION="${{ steps.version.outputs.version }}" \
            BUNDLE_ID="${BUNDLE_ID}"

      - name: Verify release package
        shell: bash
        run: |
          make verify-release \
            ARCH=universal \
            VERSION="${{ steps.version.outputs.version }}"

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: EasyBar-${{ steps.version.outputs.version }}
          path: dist/EasyBar-${{ steps.version.outputs.version }}.zip
          if-no-files-found: error

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            "dist/EasyBar-${{ steps.version.outputs.version }}.zip" \
            --generate-notes

      - name: Trigger Homebrew formula update workflow
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh workflow run update-homebrew-formula.yml \
            -f tag="${{ steps.version.outputs.tag }}" \
            -f version="${{ steps.version.outputs.version }}"
