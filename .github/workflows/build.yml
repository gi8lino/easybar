name: Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tests:
    uses: ./.github/workflows/test.yml
    with:
      xcode_version: "26"
      dependency_mode: release
      clean_before_cache: true
      check_generated: true
      test_timeout_minutes: 12

  release:
    needs: tests
    runs-on: macos-26
    permissions:
      contents: write
      actions: write

    env:
      BUNDLE_ID: io.github.gi8lino.easybar
      XCODE_VERSION: "26"

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Select pinned Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Print toolchain info
        shell: bash
        run: |
          sw_vers
          uname -a
          xcode-select -p
          xcodebuild -version
          swift --version
          xcrun --show-sdk-path
          xcrun --show-sdk-version

      - name: Install dependencies
        shell: bash
        run: scripts/ci/install-dependencies.sh release

      - name: Derive version from tag
        id: version
        shell: bash
        run: scripts/release/derive-release-vars.sh --tag "${GITHUB_REF_NAME}"

      - name: Cache SwiftPM dependencies
        uses: actions/cache@v6
        with:
          path: |
            .build/repositories
            .build/checkouts
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/org.swift.swiftpm
          key: swiftpm-deps-v1-${{ runner.os }}-${{ runner.arch }}-${{ env.XCODE_VERSION }}-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: |
            swiftpm-deps-v1-${{ runner.os }}-${{ runner.arch }}-${{ env.XCODE_VERSION }}-

      - name: Build and verify release package
        shell: bash
        run: |
          make release \
            ARCH=universal \
            VERSION="${{ steps.version.outputs.version }}" \
            BUNDLE_ID="${BUNDLE_ID}"

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: EasyBar-${{ steps.version.outputs.version }}
          path: dist/EasyBar-${{ steps.version.outputs.version }}.zip
          if-no-files-found: error

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          ASSET="dist/EasyBar-${{ steps.version.outputs.version }}.zip"

          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" "${ASSET}" --clobber
          else
            gh release create "${TAG}" "${ASSET}" --generate-notes
          fi

      - name: Trigger Homebrew package update workflow
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh workflow run update-homebrew-cask.yml \
            -f tag="${{ steps.version.outputs.tag }}" \
            -f version="${{ steps.version.outputs.version }}"
