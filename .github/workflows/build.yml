name: build

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: macos-26
    permissions:
      contents: write
      actions: write

    env:
      BUNDLE_ID: com.gi8lino.EasyBar
      XCODE_VERSION: "26"

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Select pinned Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Print toolchain info
        shell: bash
        run: |
          sw_vers
          uname -a
          xcode-select -p
          xcodebuild -version
          swift --version
          xcrun --show-sdk-path
          xcrun --show-sdk-version

      - name: Derive version from tag
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          echo "Tag: $TAG"
          echo "Version: $VERSION"

      - name: Clean build directories
        shell: bash
        run: |
          rm -rf .build dist

      - name: Build universal release artifact
        shell: bash
        run: |
          make release \
            ARCH=universal \
            VERSION="${{ steps.version.outputs.version }}" \
            BUNDLE_ID="${BUNDLE_ID}"

      - name: Verify bundled artifacts
        shell: bash
        run: |
          file "dist/EasyBar.app/Contents/MacOS/EasyBar"
          file "dist/EasyBarCalendarAgent.app/Contents/MacOS/EasyBarCalendarAgent"
          file "dist/EasyBarNetworkAgent.app/Contents/MacOS/EasyBarNetworkAgent"
          file "dist/easybar"
          test -f "dist/EasyBar.app/Contents/Info.plist"
          test -f "dist/EasyBarCalendarAgent.app/Contents/Info.plist"
          test -f "dist/EasyBarNetworkAgent.app/Contents/Info.plist"
          test -d "dist/EasyBar.app/EasyBar_EasyBar.bundle"
          test -f "dist/EasyBarCalendarAgent.app/Contents/MacOS/EasyBarCalendarAgent"
          test -f "dist/EasyBarNetworkAgent.app/Contents/MacOS/EasyBarNetworkAgent"
          test -f "dist/EasyBar-${{ steps.version.outputs.version }}.zip"
          plutil -p "dist/EasyBar.app/Contents/Info.plist"

      - name: Print build fingerprints
        shell: bash
        run: |
          shasum -a 256 "dist/EasyBar.app/Contents/MacOS/EasyBar"
          shasum -a 256 "dist/EasyBar.app/Contents/Info.plist"
          shasum -a 256 "dist/EasyBar.app/EasyBar_EasyBar.bundle/easybar_api.lua"
          codesign -dv --verbose=4 "dist/EasyBar.app" 2>&1 || true

      - name: Print package checksum
        shell: bash
        run: |
          shasum -a 256 "dist/EasyBar-${{ steps.version.outputs.version }}.zip"

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: EasyBar-${{ steps.version.outputs.version }}
          path: dist/EasyBar-${{ steps.version.outputs.version }}.zip
          if-no-files-found: error

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            "dist/EasyBar-${{ steps.version.outputs.version }}.zip" \
            --generate-notes

      - name: Trigger Homebrew formula update workflow
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh workflow run update-homebrew-formula.yml \
            -f tag="${{ steps.version.outputs.tag }}" \
            -f version="${{ steps.version.outputs.version }}"
