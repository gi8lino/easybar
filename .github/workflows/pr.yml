name: pr

on:
  pull_request:

concurrency:
  group: pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  XCODE_VERSION: "26"

jobs:
  format:
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v7

      - name: Select pinned Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Lint Swift formatting
        run: make lint

  test-and-verify-generated:
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Select pinned Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Install dependencies
        shell: bash
        run: scripts/ci/install-lua.sh

      - name: Cache SwiftPM
        uses: actions/cache@v6
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/org.swift.swiftpm
            ~/Library/Developer/Xcode/DerivedData
          key: swiftpm-${{ runner.os }}-${{ runner.arch }}-${{ env.XCODE_VERSION }}-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: |
            swiftpm-${{ runner.os }}-${{ runner.arch }}-${{ env.XCODE_VERSION }}-

      - name: Build tests
        shell: bash
        timeout-minutes: 5
        run: scripts/ci/run-swift-tests.sh build-tests.log swift build --build-tests

      - name: Run tests
        shell: bash
        timeout-minutes: 12
        run: scripts/ci/run-swift-tests.sh test.log swift test --skip-build

      - name: Upload Swift test logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: swift-test-logs
          path: |
            build-tests.log
            test.log
          if-no-files-found: ignore

      - name: Verify generated artifacts are current
        run: make check-generated

  docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Build docs
        run: make build-docs

  release-scripts:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Test Homebrew formula update scripts
        run: scripts/release/test-homebrew-formula-update.sh
