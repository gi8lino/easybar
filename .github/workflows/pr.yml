name: pr

on:
  pull_request:

jobs:
  format:
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v6

      - name: Select pinned Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26"

      - name: Lint Swift formatting
        run: swift format lint --recursive .

  test-and-verify-generated:
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Select pinned Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26"

      - name: Install dependencies
        shell: bash
        run: |
          brew update

          if [ ! -x /opt/homebrew/bin/lua ]; then
            brew install lua
          fi

          /opt/homebrew/bin/lua -v

      - name: Run tests
        shell: bash
        timeout-minutes: 10
        run: |
          set -euo pipefail

          make test > test.log 2>&1 &
          test_pid=$!

          while kill -0 "$test_pid" 2>/dev/null; do
            sleep 30
            echo "---- make test still running; last 80 lines ----"
            tail -n 80 test.log || true
          done

          wait "$test_pid" || {
            status=$?
            echo "---- extracted failures ----"
            grep -nE "(: error:|XCTAssert|failed -|Test Case '.*failed|Test Suite '.*failed)" test.log || true
            echo "---- full test log ----"
            cat test.log
            exit "$status"
          }

      - name: Upload test log
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: swift-test-log
          path: test.log

      - name: Verify generated artifacts are current
        run: make check-generated

  docs:
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v6

      - name: Select pinned Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26"

      - name: Build docs
        run: make build-docs


