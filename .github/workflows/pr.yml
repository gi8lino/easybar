name: pr

on:
  pull_request:

concurrency:
  group: pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  format:
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v6

      - name: Select pinned Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26"

      - name: Lint Swift formatting
        run: swift format lint --recursive .

  test-and-verify-generated:
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Select pinned Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26"

      - name: Install dependencies
        shell: bash
        run: scripts/ci/install-lua.sh

      - name: Run tests
        shell: bash
        timeout-minutes: 10
        run: scripts/ci/run-swift-tests.sh

      - name: Upload test log
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: swift-test-log
          path: test.log

      - name: Verify generated artifacts are current
        run: make check-generated

  docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Build docs
        run: make build-docs




