name: pr

on:
  pull_request:

concurrency:
  group: pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  XCODE_VERSION: "26"

jobs:
  format:
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v7

      - name: Select pinned Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Lint Swift formatting
        run: make lint

  test-and-verify-generated:
    uses: ./.github/workflows/test.yml
    with:
      xcode_version: "26"
      dependency_mode: test
      clean_before_cache: false
      check_generated: true
      test_timeout_minutes: 12

  docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Build docs
        run: make build-docs

  release-scripts:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Test self-contained Homebrew formula generation
        run: scripts/release/test-homebrew-formula-update.sh

