name: pr

on:
  pull_request:

jobs:
  format:
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v6

      - name: Select pinned Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26"

      - name: Lint Swift formatting
        run: swift format lint --recursive .

  test-and-verify-generated:
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Select pinned Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26"

      - name: Install dependencies
        shell: bash
        run: |
          brew update

          if [ ! -x /opt/homebrew/bin/lua ]; then
            brew install lua
          fi

          /opt/homebrew/bin/lua -v

      - name: Run tests
        run: make test

      - name: Verify generated artifacts are current
        run: |
          make generate-theme-tokens
          make generate-event-catalog
          make generate-lua-docs
          git diff --exit-code

  docs:
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v6

      - name: Select pinned Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26"

      - name: Build docs
        run: make build-docs
