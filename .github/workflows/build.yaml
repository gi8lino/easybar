name: build

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Build release artifacts
        run: |
          make bundle VERSION="${GITHUB_REF_NAME}"

      - name: Package assets
        run: |
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent dist/WiFiSnitch.app dist/WiFiSnitch.app.zip

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            dist/WiFiSnitch.app.zip \
            dist/wifisnitchctl \
            --generate-notes
