name: build

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Build universal release artifacts
        run: |
          make bundle ARCH=universal VERSION="${GITHUB_REF_NAME}"

      - name: Verify artifacts
        run: |
          file dist/EasyBar.app/Contents/MacOS/EasyBar
          file dist/wifisnitchctl

      - name: Package assets
        run: |
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent dist/EasyBar.app dist/EasyBar.app.zip

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            dist/EasyBar.app.zip \
            dist/easybarctl \
            --generate-notes
