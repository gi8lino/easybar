name: update-homebrew-cask

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag
        required: true
        type: string
      version:
        description: Release version without leading v
        required: true
        type: string

permissions:
  contents: read

jobs:
  update-cask:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout EasyBar
        uses: actions/checkout@v7

      - name: Derive asset URL
        id: vars
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          scripts/release/derive-release-vars.sh \
            --tag "${INPUT_TAG}" \
            --version "${INPUT_VERSION}" \
            --repository "${GITHUB_REPOSITORY}"

      - name: Download release archive
        shell: bash
        run: |
          curl -fL --retry 5 --retry-all-errors --retry-delay 5 \
            "${{ steps.vars.outputs.asset_url }}" \
            -o EasyBar.zip
          curl -fL --retry 5 --retry-all-errors --retry-delay 5 \
            "${{ steps.vars.outputs.calendar_agent_asset_url }}" \
            -o EasyBarCalendarAgent.zip
          curl -fL --retry 5 --retry-all-errors --retry-delay 5 \
            "${{ steps.vars.outputs.network_agent_asset_url }}" \
            -o EasyBarNetworkAgent.zip

      - name: Compute SHA-256
        id: sha
        shell: bash
        run: |
          SHA="$(sha256sum EasyBar.zip | awk '{print $1}')"
          CALENDAR_AGENT_SHA="$(sha256sum EasyBarCalendarAgent.zip | awk '{print $1}')"
          NETWORK_AGENT_SHA="$(sha256sum EasyBarNetworkAgent.zip | awk '{print $1}')"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "calendar_agent_sha=${CALENDAR_AGENT_SHA}" >> "$GITHUB_OUTPUT"
          echo "network_agent_sha=${NETWORK_AGENT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Checkout Homebrew tap
        uses: actions/checkout@v7
        with:
          repository: gi8lino/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update EasyBar cask and agent formulas
        shell: bash
        run: |
          scripts/release/update-homebrew-cask.sh \
            --tap-dir homebrew-tap \
            --repository "${GITHUB_REPOSITORY}" \
            --tag "${{ steps.vars.outputs.tag }}" \
            --version "${{ steps.vars.outputs.version }}" \
            --sha "${{ steps.sha.outputs.sha }}" \
            --calendar-agent-sha "${{ steps.sha.outputs.calendar_agent_sha }}" \
            --network-agent-sha "${{ steps.sha.outputs.network_agent_sha }}"

      - name: Commit and push Homebrew package changes
        shell: bash
        run: |
          scripts/release/commit-homebrew-cask.sh \
            --tap-dir homebrew-tap \
            --version "${{ steps.vars.outputs.version }}"
