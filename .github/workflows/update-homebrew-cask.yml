name: update-homebrew-formula

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag
        required: true
        type: string
      version:
        description: Release version without leading v
        required: true
        type: string

jobs:
  update-formula:
    runs-on: ubuntu-latest

    steps:
      - name: Derive asset URL
        id: vars
        shell: bash
        run: |
          TAG="${{ inputs.tag }}"
          VERSION="${{ inputs.version }}"
          ASSET_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/EasyBar-${VERSION}.zip"

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "asset_url=${ASSET_URL}" >> "$GITHUB_OUTPUT"

      - name: Download release archive
        shell: bash
        run: |
          curl -fL "${{ steps.vars.outputs.asset_url }}" -o EasyBar.zip

      - name: Compute SHA-256
        id: sha
        shell: bash
        run: |
          SHA="$(sha256sum EasyBar.zip | awk '{print $1}')"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: gi8lino/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        shell: bash
        run: |
          FORMULA_FILE="homebrew-tap/Formula/easybar.rb"
          mkdir -p "$(dirname "${FORMULA_FILE}")"

          cat > "${FORMULA_FILE}" <<'EOF'
          class Easybar < Formula
            desc "Scriptable macOS status bar with SwiftUI and Lua widgets"
            homepage "https://github.com/gi8lino/easybar"
            url "https://github.com/gi8lino/easybar/releases/download/v${{ inputs.version }}/EasyBar-${{ inputs.version }}.zip"
            sha256 "${{ steps.sha.outputs.sha }}"
            version "${{ inputs.version }}"

            depends_on macos: ">= :sonoma"

            def install
              libexec.install "EasyBar.app"
              bin.install "easybarctl"

              (bin/"easybar").write <<~SH
                #!/bin/bash
                exec "#{libexec}/EasyBar.app/Contents/MacOS/EasyBar" "$@"
              SH
            end

            service do
              run [opt_bin/"easybar"]
              keep_alive true
              require_root false
              working_dir HOMEBREW_PREFIX
              log_path var/"log/easybar.log"
              error_log_path var/"log/easybar.log"
            end

            test do
              assert_match "usage:", shell_output("#{bin}/easybarctl --help 2>&1")
            end
          end
          EOF

      - name: Commit and push changes
        shell: bash
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add Formula/easybar.rb

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "easybar ${{ steps.vars.outputs.version }}"
          git push
